<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login Admin | SiKalog UMKM</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <span class="logo-badge">SK</span>
        <span>SiKalog UMKM</span>
      </a>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo-badge" style="width:52px;height:52px;font-size:1.4rem;">SK</div>
      <h2>Login Admin</h2>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-login">Masuk</button>
        <p class="form-error" id="loginError"></p>
      </form>
      <p class="demo-hint">Demo admin — Username: <b>admin</b> &nbsp;|&nbsp; Password: <b>admin123</b></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
