<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daftar Produk | SiKalog UMKM</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="admin-wrap">
    <aside class="sidebar">
      <div class="brand"><span class="logo-badge">SK</span> SiKalog UMKM</div>
      <nav>
        <a href="dashboard.html">&#128202; Dashboard</a>
        <a href="admin-produk.html" class="active">&#128230; Daftar Produk</a>
        <a href="admin-produk-form.html">&#10133; Tambah Produk</a>
        <a href="admin-kategori.html">&#128203; Kategori</a>
        <a href="#" id="logoutBtn" class="logout">&#8630; Logout</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1>Daftar Produk</h1>
        <a href="admin-produk-form.html" class="btn btn-primary">+ Tambah Produk Baru</a>
      </div>

      <div id="alertBox"></div>

      <div class="panel">
        <div class="panel-head">
          <h2>Semua Produk</h2>
          <input type="text" id="searchAdmin" placeholder="Cari nama produk..." style="padding:9px 14px;border-radius:8px;border:1px solid var(--border);min-width:220px;" />
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr><th>Gambar</th><th>Nama Produk</th><th>Kategori</th><th>Harga</th><th>Stok</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="produkBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-produk.js"></script>
</body>
</html>
